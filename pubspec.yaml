name: daily_routine_tracker
description: Daily Routine Monitoring App - Track habits, build discipline.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # Local Database
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  # Excel Export
  excel: ^4.0.6
  # File Sharing
  share_plus: ^9.0.0
  # Date Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
